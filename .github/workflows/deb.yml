name: Build Debian Package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to rebuild (for manual runs)'
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string

jobs:
  build-deb:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: Workdir
      PACKAGE_NAME: workdir
      WORKSPACE_NAME: Workdir
      DEBIAN_SOURCE_DIR: packaging/debian
      DEB_ARTIFACT_GLOB: "*.deb"
    steps:
      - name: Resolve release tag
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          TAG=""
          if { [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$EVENT_NAME" = "workflow_call" ]; } && [ -n "$INPUT_RELEASE_TAG" ]; then
            TAG="$INPUT_RELEASE_TAG"
          fi
          if [ "$EVENT_NAME" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ] || [[ ! "$TAG" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "A valid tag (e.g. v2026-03-15) is required." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Derive package version from tag
        id: version
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          VERSION="${TAG#v}"
          VERSION="${VERSION//-/.}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential debhelper dh-python pybuild-plugin-pyproject \
            python3-all python3-setuptools python3-wheel devscripts fakeroot

      - name: Update debian/changelog
        env:
          DEBEMAIL: daniel.seichter@dseichter.de
          DEBFULLNAME: Daniel Seichter
        run: |
          cp -r "${{ env.DEBIAN_SOURCE_DIR }}" debian/
          chmod +x debian/rules
          dch --newversion "${{ steps.version.outputs.version }}-1" \
              --distribution unstable \
              "New upstream release ${{ steps.vars.outputs.tag }}."

      - name: Build binary .deb
        run: |
          dpkg-buildpackage -b -us -uc -rfakeroot
          find .. -maxdepth 1 -name "*.deb" -exec cp {} . \;

      - name: Collect .deb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}_${{ steps.version.outputs.version }}_all.deb
          path: ${{ env.DEB_ARTIFACT_GLOB }}

      - name: Attach .deb to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          prerelease: ${{ contains(steps.vars.outputs.tag, 'rc') || contains(steps.vars.outputs.tag, 'beta') }}
          files: ${{ env.DEB_ARTIFACT_GLOB }}
