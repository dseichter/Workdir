      #     echo "${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}" | base64 -d | \
      #       gpg --batch --import
      #     sudo apt-get install -y dput
      #     dpkg-buildpackage -S -k"${{ secrets.LAUNCHPAD_EMAIL }}" \
      #       --sign-key-id="${{ secrets.LAUNCHPAD_EMAIL }}"
      #     dput "$PPA_NAME" ../*_source.changes
