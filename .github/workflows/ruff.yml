name: 'Ruff Lint'
on:
  push:
    branches:
      - main
      - 'dseichter/**'
  pull_request:
    branches:
      - main
      - 'dseichter/**'

jobs:
  lint:
    name: 'Ruff'
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: Workdir
      PACKAGE_NAME: workdir
      WORKSPACE_NAME: Workdir
      RUFF_EXCLUDES: src/icons.py,src/resources_rc.py,version_info.py
    steps:
      - name: 'Checkout'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 'Set up Python'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: 'Install Ruff'
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: 'Ruff Lint'
        run: |
          ruff check . --exclude "${{ env.RUFF_EXCLUDES }}" --output-format=github
