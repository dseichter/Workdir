name: 'Ruff Lint'
on:
  push:
    branches:
      - main
      - 'dseichter/**'
  pull_request:
    branches:
      - main
      - 'dseichter/**'

jobs:
  lint:
    name: 'Ruff'
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: Workdir
      PACKAGE_NAME: workdir
      WORKSPACE_NAME: Workdir
      RUFF_EXCLUDES: src/icons.py,src/resources_rc.py,version_info.py
    steps:
      - name: 'Checkout'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 'Set up Python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: 'Install Ruff'
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: 'Ruff Lint'
        run: |
          ruff check . --exclude "${{ env.RUFF_EXCLUDES }}" --output-format=github
