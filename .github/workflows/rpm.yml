name: Build RPM Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to rebuild (for manual runs)'
        required: false
        type: string

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Resolve release tag
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_RELEASE_TAG" ]; then
            TAG="$INPUT_RELEASE_TAG"
          fi
          if [ -z "$TAG" ] || [[ ! "$TAG" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "A valid tag (e.g. v2026-03-10) is required." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.vars.outputs.tag }}

      # Tag format: v2026-03-10 → RPM Version: 2026.03.10
      - name: Derive package version from tag
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          VERSION="${TAG#v}"
          VERSION="${VERSION//-/.}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install build tools
        run: |
          dnf install -y \
            rpm-build python3-devel python3-setuptools \
            python3-wheel rpmdevtools curl

      - name: Set up RPM build tree
        run: rpmdev-setuptree

      - name: Update Version in spec file
        run: |
          sed -i "s/^Version:.*/Version:        ${{ env.VERSION }}/" \
            packaging/rpm/workdir.spec

      - name: Download source tarball
        run: |
          # spectool derives the source URL from the spec (evaluating RPM macros)
          # and downloads the tarball to ~/rpmbuild/SOURCES/
          spectool -g -R packaging/rpm/workdir.spec

      - name: Build RPM
        run: |
          cp packaging/rpm/workdir.spec ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/workdir.spec

      - name: Collect RPM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workdir-${{ env.VERSION }}-1.noarch.rpm
          path: ~/rpmbuild/RPMS/noarch/*.rpm

      - name: Attach RPM to GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: ~/rpmbuild/RPMS/noarch/*.rpm

      # ---------------------------------------------------------------
      # Optional: trigger a COPR rebuild via the API.
      # Requires secret: COPR_API_TOKEN (from copr.fedorainfracloud.org
      # → My Account → API token).
      # Set COPR_OWNER and COPR_PROJECT to your COPR project details.
      # ---------------------------------------------------------------
      # - name: Trigger COPR rebuild
      #   env:
      #     COPR_OWNER: dseichter
      #     COPR_PROJECT: workdir
      #   run: |
      #     dnf install -y copr-cli
      #     mkdir -p ~/.config
      #     printf '[copr-cli]\nlogin = %s\nusername = %s\ntoken = %s\ncopr_url = https://copr.fedorainfracloud.org\n' \
      #       "$COPR_OWNER" "$COPR_OWNER" "${{ secrets.COPR_API_TOKEN }}" \
      #       > ~/.config/copr
      #     copr-cli build "$COPR_OWNER/$COPR_PROJECT" \
      #       ~/rpmbuild/SRPMS/*.src.rpm
