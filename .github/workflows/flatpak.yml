name: Build Flatpak

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to attach asset to (for manual runs)'
        required: false
        type: string

jobs:
  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve release tag
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_RELEASE_TAG" ]; then
            TAG="$INPUT_RELEASE_TAG"
          fi
          if [ -z "$TAG" ] || [[ ! "$TAG" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "A valid tag (e.g. v2026.3.1) is required." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream

      - name: Validate AppStream metadata
        run: |
          appstreamcli validate --no-net packaging/flatpak/io.github.dseichter.Workdir.metainfo.xml

      - name: Install Flatpak runtime
        run: |
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08

      - name: Build Flatpak bundle
        env:
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          flatpak-builder --user --force-clean --repo=repo flatpak-build packaging/flatpak/io.github.dseichter.Workdir.yaml
          flatpak build-bundle repo "workdir-flatpak-${RELEASE_TAG}-x86_64.flatpak" io.github.dseichter.Workdir

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workdir-flatpak-${{ steps.vars.outputs.tag }}-x86_64
          path: workdir-flatpak-${{ steps.vars.outputs.tag }}-x86_64.flatpak

      - name: Upload Flatpak to Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: workdir-flatpak-${{ steps.vars.outputs.tag }}-x86_64.flatpak
