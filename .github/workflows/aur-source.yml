name: Publish to AUR (source)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to rebuild (for manual runs)'
        required: false
        type: string
      commit_username:
        description: 'Git author name for AUR commits'
        required: false
        default: 'Daniel Seichter'
        type: string
      commit_email:
        description: 'Git author email for AUR commits'
        required: false
        default: 'daniel.seichter@dseichter.de'
        type: string
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string
      commit_username:
        required: false
        default: 'Daniel Seichter'
        type: string
      commit_email:
        required: false
        default: 'daniel.seichter@dseichter.de'
        type: string
    secrets:
      AUR_SSH_PRIVATE_KEY:
        required: true

jobs:
  publish-aur-source:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: Workdir
      PACKAGE_NAME: workdir
      WORKSPACE_NAME: Workdir
      PKGBUILD_PATH: packaging/aur/PKGBUILD
    steps:
      - name: Resolve release tag
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          TAG=""
          if { [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$EVENT_NAME" = "workflow_call" ]; } && [ -n "$INPUT_RELEASE_TAG" ]; then
            TAG="$INPUT_RELEASE_TAG"
          fi
          if [ "$EVENT_NAME" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ] || [[ ! "$TAG" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "A valid tag (e.g. v2026-03-15) is required." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Prepare source PKGBUILD
        run: cp packaging/aur/PKGBUILD.source packaging/aur/PKGBUILD

      - name: Derive package version from tag
        id: version
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          VERSION="${TAG#v}"
          VERSION="${VERSION//-/.}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball sha256sum
        id: checksum
        run: |
          URL="https://github.com/${{ github.repository }}/archive/${{ steps.vars.outputs.tag }}.tar.gz"
          SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Patch PKGBUILD with new version and checksum
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" "${{ env.PKGBUILD_PATH }}"
          sed -i "s/^sha256sums=.*/sha256sums=('${{ steps.checksum.outputs.sha256 }}')/" "${{ env.PKGBUILD_PATH }}"

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@2ac5a4c1d7035885d46b10e3193393be8460b6f1 # v4.1.1
        with:
          pkgname: ${{ env.PACKAGE_NAME }}
          pkgbuild: ${{ env.PKGBUILD_PATH }}
          commit_username: ${{ inputs.commit_username }}
          commit_email: ${{ inputs.commit_email }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.vars.outputs.tag }}"
