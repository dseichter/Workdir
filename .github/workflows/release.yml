name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-binary:
    runs-on: windows-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r src/requirements.txt

      - name: Build Windows binary
        run: pyinstaller --onefile -w src/workdir.py -n workdir-windows-${{ github.ref_name }}.exe --icon=icons/workdir.ico

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workdir-windows-${{ github.ref_name }}.exe
          path: dist/workdir-windows-${{ github.ref_name }}.exe

  build-linux-binary:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install build-essential libgtk-3-dev

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r src/requirements.txt

      - name: Build Linux binary
        run: pyinstaller --onefile src/workdir.py -n workdir-linux-${{ github.ref_name }} --icon=icons/workdir.ico

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workdir-linux-${{ github.ref_name }}
          path: dist/workdir-linux-${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-windows-binary, build-linux-binary]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: workdir-linux-${{ github.ref_name }}

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: workdir-windows-${{ github.ref_name }}.exe

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s by @%an in %H" --no-merges)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"* %s by @%an in %H" --no-merges)
          fi

          # Separate dependabot and regular changes
          DEPENDABOT_CHANGES=$(echo "$COMMITS" | grep -i "dependabot" || true)
          OTHER_CHANGES=$(echo "$COMMITS" | grep -v -i "dependabot" || true)

          # Build release notes
          RELEASE_NOTES="## What's Changed\n"
          if [ ! -z "$OTHER_CHANGES" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}${OTHER_CHANGES}\n\n"
          fi

          if [ ! -z "$DEPENDABOT_CHANGES" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}## Dependency Updates\n${DEPENDABOT_CHANGES}\n\n"
          fi

          RELEASE_NOTES="${RELEASE_NOTES}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ github.ref_name }}"

          # Save to output
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo -e "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
          files: |
            workdir-linux-${{ github.ref_name }}
            workdir-windows-${{ github.ref_name }}.exe