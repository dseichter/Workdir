name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to rebuild (for manual runs)'
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string

jobs:
  resolve-release-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          TAG=""
          if { [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$EVENT_NAME" = "workflow_call" ]; } && [ -n "$INPUT_RELEASE_TAG" ]; then
            TAG="$INPUT_RELEASE_TAG"
          fi
          if [ "$EVENT_NAME" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ] || [[ ! "$TAG" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "A valid tag (e.g. v2026-03-15) is required." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-windows:
    runs-on: windows-latest
    needs: resolve-release-tag
    env:
      PROJECT_NAME: Workdir
      PACKAGE_NAME: workdir
      WORKSPACE_NAME: Workdir
      ENTRYPOINT: src/workdir.py
      ICON_FILE: icons/workdir.ico
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-release-tag.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r src/requirements.txt

      - name: Build Windows binary
        run: |
          pyinstaller --onefile "${{ env.ENTRYPOINT }}" -n "${{ env.PACKAGE_NAME }}.exe" --icon="${{ env.ICON_FILE }}"
          move "dist\${{ env.PACKAGE_NAME }}.exe" "${{ env.PACKAGE_NAME }}-${{ needs.resolve-release-tag.outputs.tag }}.exe"
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ needs.resolve-release-tag.outputs.tag }}.exe
          path: ${{ env.PACKAGE_NAME }}-${{ needs.resolve-release-tag.outputs.tag }}.exe

  build-linux:
    runs-on: ubuntu-latest
    needs: resolve-release-tag
    container:
      image: ubuntu:24.04
    env:
      PROJECT_NAME: Workdir
      PACKAGE_NAME: workdir
      WORKSPACE_NAME: Workdir
      ENTRYPOINT: src/workdir.py
      ICON_FILE: icons/workdir.ico
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-release-tag.outputs.tag }}

      - name: Install dependencies
        run: apt update && apt-get install build-essential libgtk-3-dev python3-venv python3-pip wget xz-utils libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0 -y

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r src/requirements.txt

      - name: Build Linux binary
        run: |
          pyinstaller --onefile "${{ env.ENTRYPOINT }}" -n "${{ env.PACKAGE_NAME }}" --icon="${{ env.ICON_FILE }}"
          mv "dist/${{ env.PACKAGE_NAME }}" "${{ env.PACKAGE_NAME }}-linux-x86_64-${{ needs.resolve-release-tag.outputs.tag }}"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0

        with:
          name: ${{ env.PACKAGE_NAME }}-linux-x86_64-${{ needs.resolve-release-tag.outputs.tag }}
          path: ${{ env.PACKAGE_NAME }}-linux-x86_64-${{ needs.resolve-release-tag.outputs.tag }}

  build-linux-arch:
    runs-on: ubuntu-latest
    needs: resolve-release-tag
    container:
      image: archlinux:base-devel
    env:
      PROJECT_NAME: Workdir
      PACKAGE_NAME: workdir
      WORKSPACE_NAME: Workdir
      ENTRYPOINT: src/workdir.py
      ICON_FILE: icons/workdir.ico
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-release-tag.outputs.tag }}

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git python python-pip python-setuptools \
            libxcb libxkbcommon-x11

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r src/requirements.txt

      - name: Build Arch Linux binary
        run: |
          pyinstaller --onefile "${{ env.ENTRYPOINT }}" -n "${{ env.PACKAGE_NAME }}" --icon="${{ env.ICON_FILE }}"
          mv "dist/${{ env.PACKAGE_NAME }}" "${{ env.PACKAGE_NAME }}-archlinux-x86_64-${{ needs.resolve-release-tag.outputs.tag }}"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0

        with:
          name: ${{ env.PACKAGE_NAME }}-archlinux-x86_64-${{ needs.resolve-release-tag.outputs.tag }}
          path: ${{ env.PACKAGE_NAME }}-archlinux-x86_64-${{ needs.resolve-release-tag.outputs.tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: [resolve-release-tag, build-windows, build-linux, build-linux-arch]
    env:
      PROJECT_NAME: Workdir
      PACKAGE_NAME: workdir
      WORKSPACE_NAME: Workdir
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release-tag.outputs.tag }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-linux-x86_64-${{ needs.resolve-release-tag.outputs.tag }}
          path: .

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-archlinux-x86_64-${{ needs.resolve-release-tag.outputs.tag }}
          path: .

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ needs.resolve-release-tag.outputs.tag }}.exe
          path: .

      - name: Generate Release Notes
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMIT_SHAS=$(git log --pretty=format:"%H" --no-merges)
          else
            COMMIT_SHAS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%H" --no-merges)
          fi

          COMMITS=""
          while IFS= read -r SHA; do
            [ -z "$SHA" ] && continue

            SUBJECT=$(git log -n 1 --format=%s "$SHA")
            AUTHOR_LOGIN=$(gh api "repos/${{ github.repository }}/commits/${SHA}" --jq '.author.login // .committer.login // ""' 2>/dev/null || true)

            if [ -z "$AUTHOR_LOGIN" ] || [ "$AUTHOR_LOGIN" = "null" ]; then
              AUTHOR_LOGIN=$(git log -n 1 --format=%an "$SHA" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
            fi

            COMMITS="${COMMITS}* ${SUBJECT} by @${AUTHOR_LOGIN} in ${SHA}\n"
          done <<< "$COMMIT_SHAS"

          # Separate dependabot and regular changes
          DEPENDABOT_CHANGES=$(echo -e "$COMMITS" | grep -i "dependabot" || true)
          OTHER_CHANGES=$(echo -e "$COMMITS" | grep -v -i "dependabot" || true)

          # Build release notes
          RELEASE_NOTES="## What's Changed\n"
          if [ ! -z "$OTHER_CHANGES" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}${OTHER_CHANGES}\n\n"
          fi

          if [ ! -z "$DEPENDABOT_CHANGES" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}## Dependency Updates\n${DEPENDABOT_CHANGES}\n\n"
          fi

          RELEASE_NOTES="${RELEASE_NOTES}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ needs.resolve-release-tag.outputs.tag }}"

          # Save to output
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo -e "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.resolve-release-tag.outputs.tag }}
          name: Release ${{ needs.resolve-release-tag.outputs.tag }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: ${{ contains(needs.resolve-release-tag.outputs.tag, 'rc') || contains(needs.resolve-release-tag.outputs.tag, 'beta') }}
          files: |
            ${{ env.PACKAGE_NAME }}-linux-x86_64-${{ needs.resolve-release-tag.outputs.tag }}
            ${{ env.PACKAGE_NAME }}-archlinux-x86_64-${{ needs.resolve-release-tag.outputs.tag }}
            ${{ env.PACKAGE_NAME }}-${{ needs.resolve-release-tag.outputs.tag }}.exe

