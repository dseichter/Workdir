app-id: io.github.dseichter.workdir
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: "6.10"
command: workdir

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: python-dependencies
    buildsystem: simple
    build-commands:
      - python3 -m pip install --ignore-installed --no-index --find-links="file://${PWD}" --prefix=/app urllib3==2.6.3 packaging==26.0
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/39/08/aaaad47bc4e9dc8c725e68f9d04865dbcb2052843ff09c97b08904852d84/urllib3-2.6.3-py3-none-any.whl
        sha256: bf272323e553dfb2e87d9bfd225ca7b0f467b919d7bbd355436d3fd37cb0acd4
      - type: file
        url: https://files.pythonhosted.org/packages/b7/b9/c538f279a4e237a006a2c98387d081e9eb060d203d8ed34467cc0f0b9b53/packaging-26.0-py3-none-any.whl
        sha256: b36f1fef9334a5588b4166f8bcd26a14e521f2b55e6b9de3aaa80d3ff7a37529

  - name: workdir
    buildsystem: simple
    build-commands:
      - python3 -m pip install --no-deps --no-build-isolation --no-index --prefix=/app .
      - printf '%s\n' '#!/usr/bin/env sh' 'exec python3 -m workdir "$@"' > /app/bin/workdir
      - chmod 0755 /app/bin/workdir
      - install -Dm644 io.github.dseichter.workdir.desktop /app/share/applications/io.github.dseichter.workdir.desktop
      - install -Dm644 io.github.dseichter.workdir.png /app/share/icons/hicolor/256x256/apps/io.github.dseichter.workdir.png
      - install -Dm644 io.github.dseichter.workdir.metainfo.xml /app/share/metainfo/io.github.dseichter.workdir.metainfo.xml
    sources:
      - type: dir
        path: ../..
      - type: file
        path: io.github.dseichter.workdir.desktop
      - type: file
        path: io.github.dseichter.workdir.metainfo.xml
      - type: file
        path: ../../icons/folder_open_48dp_8B1A10_FILL0_wght400_GRAD0_opsz48.png
        dest-filename: io.github.dseichter.workdir.png